destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    auth:
      type: basic
      username: 12345
      password: It's a secret to everyone
  logsService:
    type: loki
    url: https://loki.example.com/loki/api/v1/push
    auth:
      type: basic
      username: 12345
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
    controller:
      podAnnotations:
        kubernetes.azure.com/set-kube-service-host-fqdn: 'true'
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    controller:
      podAnnotations:
        kubernetes.azure.com/set-kube-service-host-fqdn: 'true'
  alloy-singleton:
    presets:
      - singleton
    controller:
      podAnnotations:
        kubernetes.azure.com/set-kube-service-host-fqdn: 'true'
clusterMetrics:
  enabled: true
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    podAnnotations:
      kubernetes.azure.com/set-kube-service-host-fqdn: 'true'
  opencost:
    deploy: true
    podAnnotations:
      kubernetes.azure.com/set-kube-service-host-fqdn: 'true'
    metricsSource: metricsService
    opencost:
      prometheus:
        external:
          url: https://prometheus.example.com/api/v1/query
      exporter:
        defaultClusterId: aks-test
costMetrics:
  enabled: true
  collector: alloy-metrics
cluster:
  name: aks-test
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

