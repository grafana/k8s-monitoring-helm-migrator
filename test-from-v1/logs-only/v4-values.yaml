destinations:
  logsService:
    type: loki
    url: https://loki.example.com/loki/api/v1/push
    tenantId: 2000
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-singleton:
    presets:
      - singleton
cluster:
  name: logs-only-test
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs

