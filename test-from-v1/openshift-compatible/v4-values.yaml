destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    proxyURL: http://192.168.1.100:8080
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
  logsService:
    type: loki
    url: https://prometheus.example.com/loki/api/v1/push
    proxyURL: http://192.168.1.100:8080
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
            - FSETID
            - KILL
            - SETGID
            - SETUID
            - SETPCAP
            - NET_BIND_SERVICE
            - NET_RAW
            - SYS_CHROOT
            - MKNOD
            - AUDIT_WRITE
            - SETFCAP
        seccompProfile:
          type: RuntimeDefault
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
            - FSETID
            - KILL
            - SETGID
            - SETUID
            - SETPCAP
            - NET_BIND_SERVICE
            - NET_RAW
            - SYS_CHROOT
            - MKNOD
            - AUDIT_WRITE
            - SETFCAP
        privileged: false
        runAsUser: 0
    global:
      podSecurityContext:
        seLinuxOptions:
          type: spc_t
  alloy-singleton:
    presets:
      - singleton
    alloy:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
            - FSETID
            - KILL
            - SETGID
            - SETUID
            - SETPCAP
            - NET_BIND_SERVICE
            - NET_RAW
            - SYS_CHROOT
            - MKNOD
            - AUDIT_WRITE
            - SETFCAP
        seccompProfile:
          type: RuntimeDefault
clusterMetrics:
  enabled: true
  kube-state-metrics: {}
  collector: alloy-metrics
hostMetrics:
  linuxHosts:
    enabled: true
  enabled: true
  collector: alloy-metrics
cluster:
  name: openshift-compatible-test
global:
  platform: openshift
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

