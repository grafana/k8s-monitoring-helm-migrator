destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
clusterMetrics:
  enabled: true
  kube-state-metrics:
    scrapeInterval: 30s
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
hostMetrics:
  linuxHosts:
    enabled: true
    scrapeInterval: 60s
  enabled: true
  collector: alloy-metrics
cluster:
  name: custom-scrape-intervals-test
global:
  scrapeInterval: 2m
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

