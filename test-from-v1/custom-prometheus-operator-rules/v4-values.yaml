destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
clusterMetrics:
  enabled: true
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
cluster:
  name: custom-prometheus-operator-rules
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  podMonitors:
    enabled: true
    extraDiscoveryRules: |-
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_pod_label_team"]
        target_label = "team"
      }
  probes:
    enabled: true
    extraDiscoveryRules: |-
      rule {
        action = "replace"
        source_labels = ["__meta_kubernetes_ingress_label_team"]
        target_label = "team"
      }
  serviceMonitors:
    enabled: true
    extraDiscoveryRules: |-
      // add a team label
      rule {
        action = "replace"
        source_labels = [
          "__meta_kubernetes_service_label_team",
          "__meta_kubernetes_endpoints_label_team",
          "__meta_kubernetes_pod_label_team",
        ]
        regex = "^(?:;*)?([^;]+).*$"
        replacement = "$1"
        target_label = "team"
      }
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

