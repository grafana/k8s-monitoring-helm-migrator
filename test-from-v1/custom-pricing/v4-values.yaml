destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    auth:
      type: basic
      username: 12345
      password: It's a secret to everyone
  logsService:
    type: loki
    url: https://loki.example.com/loki/api/v1/push
    auth:
      type: basic
      username: 12345
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-singleton:
    presets:
      - singleton
clusterMetrics:
  enabled: true
  collector: alloy-metrics
telemetryServices:
  opencost:
    deploy: true
    opencost:
      customPricing:
        enabled: true
        createConfigmap: true
        costModel:
          description: Custom pricing configuration.
          CPU: 1.5
          spotCPU: 0.007
          RAM: 0.4
          spotRAM: 0.0008
          GPU: 0.99
          storage: 0.2
          zoneNetworkEgress: 0.01
          regionNetworkEgress: 0.01
          internetNetworkEgress: 0.12
      exporter:
        defaultClusterId: custom-pricing-test
      prometheus:
        external:
          url: https://prometheus.example.com/api/prom
        existingSecretName: metricsservice-grafana-k8s-monitoring
    metricsSource: metricsService
  kube-state-metrics:
    deploy: true
costMetrics:
  enabled: true
  collector: alloy-metrics
cluster:
  name: custom-pricing-test
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

