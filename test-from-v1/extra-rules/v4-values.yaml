destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    extraLabels:
      site: northwest
    metricProcessingRules: |-
      write_relabel_config {
        source_labels = ["__name__"]
        regex = "metric_to_drop|another_metric_to_drop"
        action = "drop"
      }
    auth:
      type: basic
      username: 12345
      password: It's a secret to everyone
  logsService:
    type: loki
    url: https://loki.example.com/loki/api/v1/push
    tenantId: 2000
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-singleton:
    presets:
      - singleton
clusterMetrics:
  enabled: true
  kube-state-metrics:
    extraMetricProcessingRules: |-
      rule {
        source_labels = ["namespace"]
        regex = "production"
        action = "keep"
      }
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
cluster:
  name: extra-rules-test
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  extraDiscoveryRules: |-
    rule {
      source_labels = ["__meta_kubernetes_namespace"]
      regex = "production"
      action = "keep"
    }
  extraLogProcessingStages: |-
    stage.logfmt {
      payload = ""
    }

    stage.json {
      source = "payload"
      expressions = {
        sku = "id",
        count = "",
      }
    }

    stage.static {
      values = {
        site = "FIXME_UPDATE_THIS_REFERENCE",
      }
    }

    stage.labels {
      values = {
        sku  = "",
        count = "",
      }
    }
  collector: alloy-logs
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
            - alloy-singleton
            - alloy-logs
        metrics:
          tuning:
            useDefaultAllowList: false
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

