destinations:
  metricsService:
    type: prometheus
    url: https://prometheus.example.com/api/prom/push
    auth:
      type: basic
      username: '12345'
      password: It's a secret to everyone
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
clusterMetrics:
  enabled: true
  kubelet:
    metricsTuning:
      useDefaultAllowList: false
      includeMetrics:
        - kubelet_node_name
        - kubernetes_build_info
  cadvisor:
    metricsTuning:
      useDefaultAllowList: true
      includeMetrics:
        - container_memory_cache
        - container_memory_rss
        - container_memory_swap
  kube-state-metrics:
    metricsTuning:
      useDefaultAllowList: false
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  opencost:
    deploy: true
    metricsSource: metricsService
    opencost:
      prometheus:
        external:
          url: https://prometheus.example.com/api/v1/query
      exporter:
        defaultClusterId: custom-allow-lists-test
costMetrics:
  enabled: true
  metricsTuning:
    useDefaultAllowList: false
    excludeMetrics:
      - go_*
  collector: alloy-metrics
hostMetrics:
  linuxHosts:
    enabled: true
    metricsTuning:
      useIntegrationAllowList: true
  enabled: true
  collector: alloy-metrics
cluster:
  name: custom-allow-lists-test
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics
prometheusOperatorObjects:
  enabled: true
  crds:
    deploy: true
  collector: alloy-metrics
integrations:
  alloy:
    instances:
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-metrics
        metrics:
          tuning:
            useDefaultAllowList: true
            includeMetrics:
              - alloy_build_info
  collector: alloy-metrics

