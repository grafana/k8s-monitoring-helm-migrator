destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
cluster:
  name: multiple-integrations-example
integrations:
  cert-manager:
    instances:
      - name: cert-manager
        namespace: cert-manager
        labelSelectors:
          app.kubernetes.io/name: cert-manager
  mysql:
    instances:
      - name: mysql-cluster
        exporter:
          enabled: true
          dataSource:
            host: mysql-cluster-router.mysql-cluster
            port: 3306
            auth:
              username: grafana
              password: REDACTED
          collectors:
            - perf_schema.replication_group_members
        logs:
          enabled: true
          labelSelectors:
            app.kubernetes.io/component: mysql
        metrics:
          tuning:
            excludeMetrics:
              - mysql_exporter_collector_duration_seconds
              - mysql_exporter_collector_success
  collector: alloy-metrics
podLogsViaLoki:
  enabled: true
  collector: alloy-logs

