destinations:
  otlp-gateway:
    type: otlp
    url: http://otlp-gateway.example.com
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: false
  tail-sampler:
    type: otlp
    url: tail-sampler-deployment.default.svc.cluster.local:4317
    protocol: grpc
    tls:
      insecure: true
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
collectors:
  alloy-receiver:
    presets:
      - deployment
    alloy:
      extraPorts:
        - name: otlp-http
          port: 4318
          targetPort: 4318
          protocol: TCP
cluster:
  name: applications-cluster
applicationObservability:
  enabled: true
  receivers:
    otlp:
      http:
        enabled: true
  collector: alloy-receiver

