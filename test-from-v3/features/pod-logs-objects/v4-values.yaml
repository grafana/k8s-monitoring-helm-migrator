destinations:
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    tenantId: '1'
    auth:
      type: basic
      username: loki
      password: lokipassword
collectors:
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    liveDebugging:
      enabled: true
    alloy:
      clustering:
        enabled: true
cluster:
  name: pod-logs-objects-cluster
podLogsObjects:
  enabled: true
  nodeFilter: true

