destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
cluster:
  name: prometheus-operator-objects-cluster
prometheusOperatorObjects:
  enabled: true
  podMonitors:
    labelSelectors:
      app.kubernetes.io/name: my-app
  serviceMonitors:
    namespaces:
      - development
      - staging
      - production
    labelExpressions:
      - key: preview-build
        operator: DoesNotExist
      - key: app.kubernetes.io/name
        operator: In
        values:
          - my-app
          - my-other-app
  collector: alloy-metrics

