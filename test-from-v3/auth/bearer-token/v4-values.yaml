destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
    auth:
      type: bearerToken
      bearerToken: sample-bearer-token
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    auth:
      type: bearerToken
      bearerTokenFrom: env("LOKI_BEARER_TOKEN")
  tempo:
    type: otlp
    url: http://tempo.tempo.svc:4317
    auth:
      type: bearerToken
      bearerTokenKey: tempoBearerToken
    secret:
      create: false
      name: my-tempo-secret
      namespace: tempo
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
    alloy:
      extraEnv:
        - name: LOKI_BEARER_TOKEN
          value: sample-bearer-token
  alloy-receiver:
    presets:
      - deployment
    alloy:
      extraPorts:
        - name: jaeger-grpc
          port: 14268
          targetPort: 14268
          protocol: TCP
cluster:
  name: bearer-token-example-cluster
applicationObservability:
  enabled: true
  receivers:
    jaeger:
      thriftHttp:
        enabled: true
  collector: alloy-receiver
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics
podLogsViaLoki:
  enabled: true
  collector: alloy-logs

