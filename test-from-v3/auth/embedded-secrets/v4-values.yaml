destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
    auth:
      type: sigv4
      sigv4:
        region: ap-southeast-2
        accessKey: my-access-key
        secretKey: my-secret-key
    secret:
      embed: true
  loki:
    type: loki
    url: http://loki.loki.svc:3100/loki/api/v1/push
    auth:
      type: bearerToken
      bearerToken: my-bearer-token
    secret:
      embed: true
  tempo:
    type: otlp
    url: http://tempo.tempo.svc:4317
    auth:
      type: basic
      username: my-username
      password: my-password
    secret:
      embed: true
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-receiver:
    presets:
      - deployment
    alloy:
      extraPorts:
        - name: otlp-grpc
          port: 4317
          targetPort: 4317
          protocol: TCP
cluster:
  name: embedded-secrets-example-cluster
applicationObservability:
  enabled: true
  receivers:
    otlp:
      grpc:
        enabled: true
  collector: alloy-receiver
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics
podLogsViaLoki:
  enabled: true
  collector: alloy-logs

