destinations:
  otel-endpoint:
    type: otlp
    url: grpc.my.otel.endpoint:443
    auth:
      type: oauth2
      oauth2:
        tokenURL: https://my.idp/application/o/token/
        clientId: my-client-id
        clientSecretFile: /var/run/secrets/kubernetes.io/serviceaccount/token
        endpointParams:
          grant_type:
            - client_credentials
          client_assertion_type:
            - urn:ietf:params:oauth:client-assertion-type:jwt-bearer
    metrics:
      enabled: true
    logs:
      enabled: true
    traces:
      enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-singleton:
    presets:
      - singleton
clusterMetrics:
  enabled: true
  collector: alloy-metrics
telemetryServices:
  kube-state-metrics:
    deploy: true
cluster:
  name: oauth2-auth-example
clusterEvents:
  enabled: true
  collector: alloy-singleton
podLogsViaLoki:
  enabled: true
  collector: alloy-logs
nodeLogs:
  enabled: true
  collector: alloy-logs
prometheusOperatorObjects:
  enabled: true
  collector: alloy-metrics
annotationAutodiscovery:
  enabled: true
  collector: alloy-metrics

