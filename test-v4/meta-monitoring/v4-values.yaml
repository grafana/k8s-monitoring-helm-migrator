destinations:
  prometheus:
    type: prometheus
    url: http://prometheus.prometheus.svc:9090/api/v1/write
  loki:
    type: loki
    url: http://loki.loki.svc:3100/api/push
  tempo:
    type: otlp
    protocol: http
    url: http://tempo.tempo.svc:443/otlp
    metrics:
      enabled: false
    logs:
      enabled: false
    traces:
      enabled: true
collectors:
  alloy-metrics:
    presets:
      - clustered
      - statefulset
  alloy-logs:
    presets:
      - filesystem-log-reader
      - daemonset
  alloy-singleton:
    presets:
      - singleton
  alloy-receiver:
    presets:
      - deployment
    alloy:
      extraPorts:
        - name: jaeger-http
          port: 14268
          targetPort: 14268
          protocol: TCP
  alloy-profiles:
    presets:
      - privileged
      - daemonset
clusterMetrics:
  enabled: true
  collector: alloy-singleton
  nodeLabels:
    nodePool: true
    region: true
    availabilityZone: true
    nodeRole: true
    os: true
    architecture: true
    instanceType: true
  kubelet:
    enabled: false
  kubeletResource:
    enabled: false
  cadvisor:
    enabled: true
    extraMetricProcessingRules: |-
      rule {
        action = "keep"
        source_labels = ["namespace"]
        regex = "collectors|logs|metrics|o11y"
      }
  apiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeDNS:
    enabled: false
  kubeProxy:
    enabled: false
  kubeScheduler:
    enabled: false
  kube-state-metrics:
    namespaces: collectors,logs,metrics,o11y
    metricsTuning:
      useDefaultAllowList: false
      includeMetrics:
        - (.+)
telemetryServices:
  kube-state-metrics:
    deploy: true
  node-exporter:
    deploy: true
  opencost:
    deploy: false
    metricsSource: prometheus
    opencost:
      prometheus:
        external:
          url: http://prometheus.prometheus.svc:9090/api/v1/query
      exporter:
        defaultClusterId: loki-meta-monitoring-cluster
hostMetrics:
  linuxHosts:
    enabled: true
    metricsTuning:
      useIntegrationAllowList: true
  enabled: true
  collector: alloy-metrics
cluster:
  name: loki-meta-monitoring-cluster
integrations:
  collector: alloy-singleton
  nodeLabels:
    nodepool: true
    region: true
    availability_zone: true
    node_role: true
    os: true
    architecture: true
    instance_type: true
  alloy:
    instances:
      - name: alloy-in-logs
        namespaces:
          - logs
        labelSelectors:
          app.kubernetes.io/name: alloy-singleton
      - name: alloy
        labelSelectors:
          app.kubernetes.io/name:
            - alloy-singleton
            - alloy-metrics
            - alloy-logs
            - alloy-profiles
            - alloy-receiver
        namespaces:
          - collectors
  grafana:
    instances:
      - name: grafana
        namespaces:
          - o11y
        labelSelectors:
          app.kubernetes.io/name: grafana
  loki:
    instances:
      - name: loki
        namespaces:
          - logs
        labelSelectors:
          app.kubernetes.io/name: loki
        logs:
          tuning:
            structuredMetadata:
              caller: null
              tenant: null
              org_id: null
              user: null
  mimir:
    instances:
      - name: mimir
        namespaces:
          - metrics
        labelSelectors:
          app.kubernetes.io/name: mimir
        logs:
          tuning:
            structuredMetadata:
              caller: null
              tenant: null
              org_id: null
              user: null
clusterEvents:
  enabled: true
  collector: alloy-singleton
  namespaces:
    - collectors
    - logs
    - metrics
    - o11y
nodeLogs:
  enabled: false
podLogsViaKubernetesApi:
  enabled: true
  collector: alloy-singleton
  nodeLabels:
    nodePool: true
    region: true
    availabilityZone: true
    nodeRole: true
    os: true
    architecture: true
    instanceType: true
  structuredMetadata:
    nodepool: null
    region: null
    availability_zone: null
    node_role: null
    os: null
    architecture: null
    instance_type: null
  labelsToKeep:
    - app
    - app_kubernetes_io_name
    - component
    - container
    - job
    - level
    - namespace
    - pod
    - service_name
  namespaces:
    - collectors
    - logs
    - metrics
    - o11y
applicationObservability:
  enabled: true
  receivers:
    jaeger:
      thriftHttp:
        enabled: true
        port: 14268
  processors:
    k8sattributes:
      metadata:
        - k8s.namespace.name
        - k8s.pod.name
        - k8s.deployment.name
        - k8s.statefulset.name
        - k8s.daemonset.name
        - k8s.cronjob.name
        - k8s.job.name
        - k8s.node.name
        - k8s.pod.uid
        - k8s.pod.start_time
        - k8s.container.name
  collector: alloy-receiver

